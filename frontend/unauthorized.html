<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unauthorized – Academic Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-background-light font-display min-h-screen flex items-center justify-center p-6"
  >
    <div class="max-w-md w-full">
      <div
        class="bg-white rounded-2xl shadow-xl border border-red-200 overflow-hidden"
      >
        <div class="p-8 text-center">
          <div
            class="w-20 h-20 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6"
          >
            <span class="material-symbols-outlined text-5xl">block</span>
          </div>
          <h1 class="text-3xl font-black text-slate-900 mb-3">Access Denied</h1>
          <p class="text-slate-600 mb-8">
            You don't have permission to access this page. Please contact your
            administrator if you believe this is a mistake.
          </p>
          <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a
              href="dashboard.html"
              class="bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-6 rounded-xl transition-all inline-flex items-center justify-center gap-2"
            >
              <span class="material-symbols-outlined text-lg">dashboard</span>
              Go to Dashboard
            </a>
            <a
              href="login.html"
              class="bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-3 px-6 rounded-xl transition-all inline-flex items-center justify-center gap-2"
            >
              <span class="material-symbols-outlined text-lg">login</span>
              Switch Account
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
